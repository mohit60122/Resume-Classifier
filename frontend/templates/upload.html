{% extends "base.html" %}
{% block title %}Upload Resumes{% endblock %}

{% block content %}
<section class="page-section">
    <div class="page-header">
        <h1 class="page-title">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Classify Resumes
        </h1>
        <p class="page-subtitle">Upload PDF or DOCX resumes to automatically classify them into job categories using our ML model.</p>
    </div>

    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data" id="upload-form">
        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
            <input type="file" name="resumes" id="file-input" multiple accept=".pdf,.docx" hidden>
            <div class="dropzone-content">
                <div class="dropzone-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17,8 12,3 7,8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <h3 class="dropzone-title">Drag & drop resumes here</h3>
                <p class="dropzone-text">or <button type="button" class="dropzone-btn" onclick="document.getElementById('file-input').click()">browse files</button></p>
                <div class="dropzone-formats">
                    <span class="format-badge">PDF</span>
                    <span class="format-badge">DOCX</span>
                    <span class="format-limit">Max 10 MB each</span>
                </div>
            </div>
        </div>

        <!-- File List -->
        <div class="file-list" id="file-list" style="display: none;">
            <h3 class="file-list-title">Selected Files</h3>
            <div id="file-items"></div>
        </div>

        <!-- Submit Button -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg" id="classify-btn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="btn-text">Classify Resumes</span>
                <span class="btn-loading" style="display:none;">
                    <span class="spinner"></span> Processing...
                </span>
            </button>
        </div>
    </form>
</section>
{% endblock %}
